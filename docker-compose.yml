version: "3.9"
name: pixelLiberty
services:
  vite-app:
    image: node:20
    container_name: pixel-liberty-app
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    restart: always
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host"